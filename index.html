<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- SEO Metadata -->
    <title>PulseTime Pro | Premium Time Management Suite</title>
    <meta name="description" content="PulseTime Pro is a premium SaaS-style multi-tool time management platform. Features include stopwatch, countdown timer, sleep timer, multi-timer system, Pomodoro, and alarms.">
    <meta name="keywords" content="time management, stopwatch, timer, pomodoro, alarm, sleep timer, productivity, SaaS">
    <meta name="author" content="PulseTime Pro">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://moe-2010.github.io/pulsetime-pro/">
    <meta property="og:title" content="PulseTime Pro | Premium Time Management Suite">
    <meta property="og:description" content="Master your time with PulseTime Pro. Professional tools for professionals.">
    <meta property="og:image" content="https://moe-2010.github.io/pulsetime-pro/assets/og-image.png">

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "PulseTime Pro",
      "url": "https://moe-2010.github.io/pulsetime-pro/",
      "description": "Premium multi-tool time management platform.",
      "applicationCategory": "ProductivityApplication",
      "operatingSystem": "Web Browser",
      "offers": {
        "@type": "Offer",
        "price": "0.00",
        "priceCurrency": "USD"
      }
    }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="light-mode">
    <div class="app-wrapper">
        
        <!-- Professional Top Navbar -->
        <header class="top-navbar">
            <div class="nav-left">
                <button id="menu-toggle" class="icon-btn" aria-label="Toggle Menu">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div class="branding">
                    <i class="fa-solid fa-bolt-lightning brand-icon"></i>
                    <span class="brand-name">PulseTime <span class="brand-pro">Pro</span></span>
                </div>
            </div>
            <div class="nav-center desktop-only">
                <span id="active-tool-title" class="active-tool-display">Stopwatch</span>
            </div>
            <div class="nav-right">
                <button class="theme-toggle-btn icon-btn" title="Toggle Theme">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <button class="icon-btn" id="settings-btn" title="Settings">
                    <i class="fa-solid fa-cog"></i>
                </button>
            </div>
        </header>

        <div class="app-container">
            <!-- Collapsible Sidebar Navigation -->
            <aside id="sidebar" class="sidebar">
                <nav>
                    <button class="nav-item active" data-tab="stopwatch" title="Stopwatch">
                        <i class="fa-solid fa-stopwatch"></i>
                        <span class="nav-text">Stopwatch</span>
                    </button>
                    <button class="nav-item" data-tab="timer" title="Countdown Timer">
                        <i class="fa-solid fa-hourglass-half"></i>
                        <span class="nav-text">Timer</span>
                    </button>
                    <button class="nav-item" data-tab="pomodoro" title="Pomodoro">
                        <i class="fa-solid fa-brain"></i>
                        <span class="nav-text">Pomodoro</span>
                    </button>
                    <button class="nav-item" data-tab="multitimer" title="Multi-Timer">
                        <i class="fa-solid fa-layer-group"></i>
                        <span class="nav-text">Multi-Timer</span>
                    </button>
                    <button class="nav-item" data-tab="sleeptimer" title="Sleep Timer">
                        <i class="fa-solid fa-moon"></i>
                        <span class="nav-text">Sleep Timer</span>
                    </button>
                    <button class="nav-item" data-tab="alarm" title="Alarms">
                        <i class="fa-solid fa-bell"></i>
                        <span class="nav-text">Alarms</span>
                    </button>
                </nav>
                <div class="sidebar-footer">
                    <div class="shortcut-hint desktop-only">
                        <span class="key">Space</span> to Start/Stop
                    </div>
                </div>
            </aside>

            <!-- Overlay for mobile menu -->
            <div id="menu-overlay" class="menu-overlay"></div>

            <!-- Main Content -->
            <main class="main-content">
                <!-- Main Header Title (Professional Appearance) -->
                <div class="content-header">
                    <h1 id="main-title" class="main-title">Stopwatch</h1>
                    <p id="main-subtitle" class="main-subtitle">Precision tracking with millisecond accuracy.</p>
                </div>

                <!-- Stopwatch Section -->
                <section id="stopwatch" class="tab-content active">
                    <div class="glass-card display-card">
                        <div class="timer-display" id="stopwatch-display">00:00:00.00</div>
                        <div class="controls">
                            <button id="stopwatch-start" class="btn btn-primary">Start</button>
                            <button id="stopwatch-lap" class="btn btn-secondary" disabled>Lap</button>
                            <button id="stopwatch-reset" class="btn btn-danger">Reset</button>
                        </div>
                        <div class="lap-list-container">
                            <ul id="lap-list"></ul>
                        </div>
                    </div>
                </section>

                <!-- Countdown Timer Section -->
                <section id="timer" class="tab-content">
                    <div class="glass-card display-card">
                        <div class="timer-input-group">
                            <div class="input-field">
                                <input type="number" id="timer-h" min="0" max="99" value="0" inputmode="numeric">
                                <span>HH</span>
                            </div>
                            <div class="input-field">
                                <input type="number" id="timer-m" min="0" max="59" value="0" inputmode="numeric">
                                <span>MM</span>
                            </div>
                            <div class="input-field">
                                <input type="number" id="timer-s" min="0" max="59" value="0" inputmode="numeric">
                                <span>SS</span>
                            </div>
                        </div>
                        <div class="timer-display" id="timer-display">00:00:00</div>
                        <div class="controls">
                            <button id="timer-start" class="btn btn-primary">Start</button>
                            <button id="timer-reset" class="btn btn-danger">Reset</button>
                        </div>
                    </div>
                </section>

                <!-- Pomodoro Section -->
                <section id="pomodoro" class="tab-content">
                    <div class="glass-card display-card">
                        <div class="pomodoro-modes">
                            <button class="pomo-mode active" data-time="25">Work</button>
                            <button class="pomo-mode" data-time="5">Short Break</button>
                            <button class="pomo-mode" data-time="15">Long Break</button>
                        </div>
                        <div class="timer-display" id="pomodoro-display">25:00</div>
                        <div class="controls">
                            <button id="pomodoro-start" class="btn btn-primary">Start</button>
                            <button id="pomodoro-reset" class="btn btn-danger">Reset</button>
                        </div>
                    </div>
                </section>

                <!-- Multi-Timer Section -->
                <section id="multitimer" class="tab-content">
                    <div class="section-header">
                        <button id="add-multitimer" class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Timer</button>
                    </div>
                    <div class="multitimer-grid" id="multitimer-container">
                        <!-- Dynamic Timers -->
                    </div>
                </section>

                <!-- Sleep Timer Section -->
                <section id="sleeptimer" class="tab-content">
                    <div class="glass-card display-card">
                        <div class="timer-input-group">
                            <div class="input-field">
                                <input type="number" id="sleep-m" min="1" max="120" value="30" inputmode="numeric">
                                <span>Minutes</span>
                            </div>
                        </div>
                        <div class="timer-display" id="sleep-display">30:00</div>
                        <div class="controls">
                            <button id="sleep-start" class="btn btn-primary">Start</button>
                            <button id="sleep-reset" class="btn btn-danger">Reset</button>
                        </div>
                        <div id="fade-status" class="status-msg"></div>
                    </div>
                </section>

                <!-- Alarms Section -->
                <section id="alarm" class="tab-content">
                    <div class="section-header">
                        <button id="add-alarm" class="btn btn-primary"><i class="fa-solid fa-plus"></i> Add Alarm</button>
                    </div>
                    <div class="alarm-list" id="alarm-container">
                        <!-- Dynamic Alarms -->
                    </div>
                </section>

                <!-- Ads -->
                <div class="ad-slot ad-footer">
                    <span class="ad-placeholder">Ad Space - Footer</span>
                </div>
            </main>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Audio Elements -->
    <audio id="audio-alarm-1" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
